<!DOCTYPE html>
<html>
<head>
    <title>今日のタスク</title>
</head>
<body>
    <h1>今日のタスク</h1>
    <p>進捗: {{ rate }}%</p>
    {% for task in tasks %}
        <p>
            {{ task.name }}
            {% if task.done %}
                ✅
            {% else %}
                <form action="/complete" method="POST">
                    <input type="hidden" name="task_name" value="{{ task.name }}">
                    <button type="submit">完了</button>
                </form>
            {% endif %}
        </p>
    {% endfor %}
    途中終了する場合は下のボタンを押してください
    <form action="/cancel" method="POST">
        <button type="submit">終了</button>
    </form>
</body>
</html>
