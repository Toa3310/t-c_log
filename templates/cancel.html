<!DOCTYPE html>
<html>
<head>
    <title>途中終了しました</title>
</head>
<body>
    <h1>今回はここまでにしました</h1>
    <p>今日やったタスク↓</p>
    <ul>
        {% for task in tasks %}
            <li>{{ task.name }} {% if task.done %}✅{% else %}(未完了){% endif %}</li>
        {% endfor %}
    </ul>
    <p>進捗: {{ rate }}%</p>
    <p><a href="/">トップに戻る</a></p>
</body>
</html>
