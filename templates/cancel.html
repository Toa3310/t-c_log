{% extends "base.html" %}

{% block title %}途中終了しました{% endblock %}

{% block content %}
    <h1>今回はここまでにしました</h1>
    <p>今日やったタスク↓</p>
    <ul>
        {% for task in tasks %}
            <li>{{ task.name }} {% if task.done %}✅{% else %}(未完了){% endif %}</li>
        {% endfor %}
    </ul>
    <p>進捗: {{ rate }}%</p>

    <form action="/save" method="POST">
        <label for="memo">今日の振り返り（一言メモ）</label><br>
        <textarea id="memo" name="memo" rows="3" cols="40"></textarea><br>
        <button type="submit">記録する</button>
    </form>
{% endblock %}
