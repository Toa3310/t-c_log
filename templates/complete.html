{% extends "base.html" %}

{% block title %}お疲れさまでした{% endblock %}

{% block content %}
    <h1>今日のタスクは全て完了しました！</h1>
    <p>以下のタスクをしました↓</p>
    <ul>
        {% for task in tasks %}
            <li>{{ task.name }} ✅</li>
        {% endfor %}
    </ul>
    <p>進捗: {{ rate }}%</p>

    <form action="/save" method="POST">
        <label for="memo">今日の振り返り（一言メモ）</label><br>
        <textarea id="memo" name="memo" rows="3" placeholder="例: 順調だった"></textarea><br>
        <button type="submit">記録する</button>
    </form>
{% endblock %}
